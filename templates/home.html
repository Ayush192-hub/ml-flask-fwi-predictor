<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FWI Prediction</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; padding-top: 50px; }
        .login { display: inline-block; text-align: left; }
        input { margin: 5px 0; padding: 10px; width: 250px; }
        button { margin-top: 10px; width: 275px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login">
        <h1>FWI Prediction</h1>

        <!-- Main Form for ML Prediction -->
        <form action="{{ url_for('predict_datapoint') }}" method="post">
            
            <input type="text" name="Temperature" placeholder="Temperature" required="required" /><br>
            <input type="text" name="RH" placeholder="RH (Relative Humidity)" required="required" /><br>
            <input type="text" name="Ws" placeholder="Ws (Wind Speed)" required="required" /><br>
            <input type="text" name="Rain" placeholder="Rain" required="required" /><br>
            <input type="text" name="FFMC" placeholder="FFMC Index" required="required" /><br>
            <input type="text" name="DMC" placeholder="DMC Index" required="required" /><br>
            <input type="text" name="ISI" placeholder="ISI Index" required="required" /><br>
            <input type="text" name="Classes" placeholder="Classes" required="required" /><br>
            <input type="text" name="Region" placeholder="Region" required="required" /><br>

            <button type="submit">Predict Now</button>
        </form>

        <br>
        <h3>The FWI Result is: {{ result }}</h3>
    </div>

</body>
</html>
